<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeynep'e Sürpriz ❤️</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            background: linear-gradient(135deg, #ffe4e1, #ffb6c1); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .box { 
            text-align: center; 
            background: white; 
            padding: 50px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(255, 71, 87, 0.2); 
        }
        h1 { color: #ff4757; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #57606f; font-size: 1.2rem; }
        .heart { color: #ff4757; font-size: 50px; animation: pulse 1.2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="heart">❤️</div>
        <h1>Seni Çok Seviyorum Zeynep!</h1>
        <p>Senin için hazırladığım sürpriz web sitesi çok yakında burada olacak...</p>
    </div>
</body>
</html>
